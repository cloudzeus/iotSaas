name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:test@localhost:3306/iotdgsmart"
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:test@localhost:3306/iotdgsmart"
      - run: npm run build
        env:
          DATABASE_URL: "mysql://root:test@localhost:3306/iotdgsmart"
          NEXTAUTH_SECRET: "ci-test-secret-32chars-minimum!!"
          NEXTAUTH_URL: "http://localhost:3000"
          MILESIGHT_CLIENT_ID: "dummy"
          MILESIGHT_CLIENT_SECRET: "dummy"
          MILESIGHT_BASE_URL: "https://eu-openapi.milesight.com"
          MILESIGHT_UUID: "dummy"
          MILESIGHT_WEBHOOK_SECRET: "dummy"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
